<!-- Full Page Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-content">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-white">Please wait...</p>
    </div>
</div>

<!-- Inline Loading Spinner -->
<div class="inline-spinner" style="display: none;">
    <div class="spinner-border spinner-border-sm text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>

<style>
    /* Full Page Loading Overlay */
    .loading-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    .loading-overlay.show {
        opacity: 1;
    }

    .loading-content {
        text-align: center;
    }

    .loading-content .spinner-border {
        width: 3rem;
        height: 3rem;
    }

    /* Inline Loading Spinner */
    .inline-spinner {
        display: inline-block;
        margin: 0 0.5rem;
    }
</style>

<script>
// Loading Overlay Functions
const loadingOverlay = {
    show: function(message = 'Please wait...') {
        const overlay = document.getElementById('loadingOverlay');
        const messageEl = overlay.querySelector('p');
        messageEl.textContent = message;
        overlay.style.display = 'flex';
        // Force reflow
        overlay.offsetHeight;
        overlay.classList.add('show');
    },
    hide: function() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.remove('show');
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 300);
    }
};

// Inline Spinner Functions
const inlineSpinner = {
    show: function(targetElement) {
        const spinner = document.querySelector('.inline-spinner').cloneNode(true);
        spinner.style.display = 'inline-block';
        targetElement.appendChild(spinner);
    },
    hide: function(targetElement) {
        const spinner = targetElement.querySelector('.inline-spinner');
        if (spinner) {
            spinner.remove();
        }
    }
};

// Example usage:
// Full page overlay:
// loadingOverlay.show('Loading data...');
// setTimeout(() => loadingOverlay.hide(), 2000);

// Inline spinner:
// const button = document.querySelector('#someButton');
// inlineSpinner.show(button);
// setTimeout(() => inlineSpinner.hide(button), 2000);
</script>
